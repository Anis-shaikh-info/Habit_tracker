<!DOCTYPE html>
<html>
<head><title>Supabase Test</title></head>
<body>
    <h1>Testing Supabase Connection</h1>
    <pre id="output">Waiting...</pre>
    <script>
        const SUPABASE_URL = "https://hbxyoyqjwregpwipunwt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhieHlveXFqd3JlZ3B3aXB1bnd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDczMzgsImV4cCI6MjA5MjUyMzMzOH0.uypKLrJfg-zvWwqddaEgRKjKuZK7BORKKVGbmhZS6cA";
        
        const output = document.getElementById('output');
        
        async function test() {
            output.textContent = "Testing fetch to Supabase...\n";
            try {
                // Test 1: Can we reach Supabase?
                const response = await fetch(SUPABASE_URL + "/rest/v1/", {
                    headers: {
                        "apikey": SUPABASE_ANON_KEY
                    }
                });
                output.textContent += "Fetch response status: " + response.status + "\n";
                if (response.ok) {
                    output.textContent += "✅ Supabase is reachable!\n";
                } else {
                    output.textContent += "❌ Supabase returned error: " + response.status + "\n";
                }
            } catch (err) {
                output.textContent += "❌ Network error: " + err.message + "\n";
                output.textContent += "This means your browser cannot connect to Supabase at all.\n";
            }
        }
        test();
    </script>
</body>
</html>
